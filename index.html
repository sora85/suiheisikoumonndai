<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>水平思考ゲーム（AI判定）</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  #game { max-width: 700px; margin: auto; }

  input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
  }

  #questionBox {
    background: #2c2c54;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  #counter { margin-bottom: 10px; font-weight: bold; }

  #log { margin-top: 20px; text-align: left; }

  .correct { color: gold; font-weight: bold; }

  #answerBox {
    margin-top: 20px;
    display: none;
    background: #3a3a6a;
    padding: 15px;
    border-radius: 10px;
  }

  #gameOver { color: orange; font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>

<h1>🧠 水平思考ゲーム（AI判定）</h1>

<div id="game">
  <button onclick="newGame()">新しい問題</button>

  <div id="questionBox"></div>
  <div id="counter"></div>

  <input id="userInput" placeholder="質問 or 答えを入力">
  <button id="askBtn" onclick="ask()">送信</button>

  <div id="log"></div>

  <div id="gameOver"></div>

  <button onclick="showAnswer()">答えを見る</button>

  <div id="answerBox"></div>
</div>

<script>
  const API_KEY = "YOUR_API_KEY_HERE"; // ←ここに自分のAPIキーを入れる

  const problems = [
    { q: "男は毎日同じレストランで食事をしていたが、ある日を境に行かなくなった。なぜ？", a: "その店で働いていたがクビになったから" },
    { q: "男はエレベーターで毎日違う階までしか行かない。なぜ？", a: "背が低くてボタンが届かないから" }
  ];

  let current;
  let remaining;

  async function isCorrectAI(input, answer) {
    const prompt = `あなたは水平思考ゲームの判定者です。\n
答え: ${answer}\n
プレイヤーの回答: ${input}\n
この回答は本質的に正しいですか？\n「はい」か「いいえ」だけで答えてください。`;

    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    return reply.includes("はい");
  }

  function newGame() {
    current = problems[Math.floor(Math.random() * problems.length)];
    remaining = 25;

    document.getElementById("questionBox").textContent = current.q;
    document.getElementById("answerBox").textContent = current.a;
    document.getElementById("counter").textContent = `残り質問回数: ${remaining}`;

    document.getElementById("log").innerHTML = "";
    document.getElementById("answerBox").style.display = "none";
    document.getElementById("gameOver").textContent = "";
    document.getElementById("askBtn").disabled = false;
  }

  async function ask() {
    if (remaining <= 0) return;

    const inputEl = document.getElementById("userInput");
    const text = inputEl.value;
    const log = document.getElementById("log");

    if (!text) return;

    document.getElementById("askBtn").disabled = true;

    const correct = await isCorrectAI(text, current.a);

    if (correct) {
      const div = document.createElement("div");
      div.className = "correct";
      div.textContent = `🎉 正解！ (${text})`;
      log.appendChild(div);

      document.getElementById("gameOver").textContent = "クリア！";
      return;
    }

    remaining--;
    document.getElementById("counter").textContent = `残り質問回数: ${remaining}`;

    const div = document.createElement("div");
    div.textContent = `Q: ${text} → 判定中AI: 不正解`;
    log.appendChild(div);

    inputEl.value = "";

    if (remaining === 0) {
      document.getElementById("gameOver").textContent = "ゲーム終了！答えを確認しよう";
    } else {
      document.getElementById("askBtn").disabled = false;
    }
  }

  function showAnswer() {
    document.getElementById("answerBox").style.display = "block";
  }

  newGame();
</script>

</body>
</html>
