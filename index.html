<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>水平思考ゲーム（自動問題＋25問制限）</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  #game { max-width: 700px; margin: auto; }

  input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin: 5px;
  }

  #questionBox {
    background: #2c2c54;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  #counter {
    margin-bottom: 10px;
    font-weight: bold;
  }

  #log {
    margin-top: 20px;
    text-align: left;
  }

  .yes { color: lightgreen; }
  .no { color: tomato; }
  .unknown { color: gray; }

  #answerBox {
    margin-top: 20px;
    display: none;
    background: #3a3a6a;
    padding: 15px;
    border-radius: 10px;
  }

  #gameOver {
    color: orange;
    font-weight: bold;
    margin-top: 15px;
  }
</style>
</head>
<body>

<h1>🧠 水平思考ゲーム</h1>

<div id="game">
  <button onclick="newGame()">新しい問題</button>

  <div id="questionBox"></div>
  <div id="counter"></div>

  <input id="userInput" placeholder="質問を入力（はい/いいえ）">
  <button id="askBtn" onclick="ask()">質問する</button>

  <div id="log"></div>

  <div id="gameOver"></div>

  <button onclick="showAnswer()">答えを見る</button>

  <div id="answerBox"></div>
</div>

<script>
  const problems = [
    { q: "男は毎日同じレストランで食事をしていたが、ある日を境に行かなくなった。なぜ？", a: "その店で働いていたがクビになったから" },
    { q: "男はエレベーターで毎日違う階までしか行かない。なぜ？", a: "背が低くてボタンが届かないから" },
    { q: "雨の日だけ客が増える店がある。なぜ？", a: "傘を売っている店だから" },
    { q: "男は毎日同じ時間に家を出るが、ある日だけ早く出た。なぜ？", a: "その日は遅刻しそうだったから" },
    { q: "男は自分の家なのに入れなかった。なぜ？", a: "鍵を忘れたから" },
    { q: "ある男は雨なのに傘をささず濡れなかった。なぜ？", a: "屋内にいたから" },
    { q: "男は走っていたのにゴールできなかった。なぜ？", a: "競争ではなかったから" },
    { q: "ある人は毎日同じ本を読むが飽きない。なぜ？", a: "勉強しているから" },
    { q: "男はドアを開けたのに外に出られなかった。なぜ？", a: "別の部屋につながっていたから" },
    { q: "ある店は商品を無料で配っているのに儲かっている。なぜ？", a: "広告収入があるから" },
    { q: "男は水を飲んだのに喉の渇きが治らなかった。なぜ？", a: "海水だったから" },
    { q: "女は毎日同じ服を着ているのに問題ない。なぜ？", a: "制服だから" },
    { q: "ある人は毎日同じ道を通るが迷わない。なぜ？", a: "通勤ルートだから" }
  ];

  let current;
  let remaining;

  const keywords = {
    "仕事": "yes",
    "働": "yes",
    "店": "yes",
    "クビ": "yes",
    "身長": "yes",
    "低い": "yes",
    "雨": "yes",
    "傘": "yes",
    "病気": "no",
    "死": "no",
    "事故": "no"
  };

  function newGame() {
    current = problems[Math.floor(Math.random() * problems.length)];
    remaining = 25;

    document.getElementById("questionBox").textContent = current.q;
    document.getElementById("answerBox").textContent = current.a;
    document.getElementById("counter").textContent = `残り質問回数: ${remaining}`;

    document.getElementById("log").innerHTML = "";
    document.getElementById("answerBox").style.display = "none";
    document.getElementById("gameOver").textContent = "";
    document.getElementById("askBtn").disabled = false;
  }

  function ask() {
    if (remaining <= 0) return;

    const input = document.getElementById("userInput");
    const text = input.value;
    const log = document.getElementById("log");

    if (!text) return;

    remaining--;
    document.getElementById("counter").textContent = `残り質問回数: ${remaining}`;

    let result = "unknown";
    for (let key in keywords) {
      if (text.includes(key)) {
        result = keywords[key];
        break;
      }
    }

    const div = document.createElement("div");
    div.className = result;

    let reply = "わからない";
    if (result === "yes") reply = "はい";
    if (result === "no") reply = "いいえ";

    div.textContent = `Q: ${text} → ${reply}`;
    log.appendChild(div);

    input.value = "";

    if (remaining === 0) {
      document.getElementById("gameOver").textContent = "ゲーム終了！答えを確認しよう";
      document.getElementById("askBtn").disabled = true;
    }
  }

  function showAnswer() {
    document.getElementById("answerBox").style.display = "block";
  }

  // 初期表示
  newGame();
</script>

</body>
</html>
